# Pre-commit hooks for LlamaTrade
# Install: pip install pre-commit && pre-commit install

repos:
  # Python linting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix, --config=pyproject.toml]
        files: ^(services|libs)/
        exclude: ^(libs/grpc/llamatrade/|services/.*/src/grpc/)
      - id: ruff-format
        args: [--config=pyproject.toml]
        files: ^(services|libs)/
        exclude: ^(libs/grpc/llamatrade/|services/.*/src/grpc/)

  # Python type checking with mypy (run per-service to avoid duplicate module error)
  # Note: services/*/src/grpc folders are excluded via --exclude flag
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c '.venv/bin/mypy libs/common --ignore-missing-imports --exclude "src/grpc" && .venv/bin/mypy services/auth --ignore-missing-imports --exclude "src/grpc" && .venv/bin/mypy services/strategy --ignore-missing-imports --exclude "src/grpc" && .venv/bin/mypy services/backtest --ignore-missing-imports --exclude "src/grpc" && .venv/bin/mypy services/market-data --ignore-missing-imports --exclude "src/grpc" && .venv/bin/mypy services/trading --ignore-missing-imports --exclude "src/grpc" && .venv/bin/mypy services/portfolio --ignore-missing-imports --exclude "src/grpc" && .venv/bin/mypy services/notification --ignore-missing-imports --exclude "src/grpc" && .venv/bin/mypy services/billing --ignore-missing-imports --exclude "src/grpc"'
        language: system
        files: ^(services|libs)/.*\.py$
        pass_filenames: false

  # Frontend linting
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: bash -c 'cd apps/web && npm run lint'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

      - id: typescript
        name: TypeScript Check
        entry: bash -c 'cd apps/web && npx tsc --noEmit'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: ^infrastructure/k8s/
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
