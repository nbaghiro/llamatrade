# Pre-commit hooks for LlamaTrade
# Install: pip install pre-commit && pre-commit install

repos:
  # Check for suppression comments (must run first)
  - repo: local
    hooks:
      - id: no-suppressions
        name: No lint/type suppression comments
        entry: ./scripts/check-no-suppressions.sh
        language: script
        files: ^(services|libs)/.*\.py$
        pass_filenames: false

  # Python linting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix, --ignore-noqa, --config=pyproject.toml]
        files: ^(services|libs)/
        exclude: ^(libs/proto/llamatrade_proto/generated/|libs/proto/connectrpc/)
      - id: ruff-format
        args: [--config=pyproject.toml]
        files: ^(services|libs)/
        exclude: ^(libs/proto/llamatrade_proto/generated/|libs/proto/connectrpc/)

  # Python type checking with Pyright (uses config from pyproject.toml)
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: npx pyright
        language: system
        files: ^(services|libs)/.*\.py$
        pass_filenames: false

  # Frontend linting
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: bash -c 'cd apps/web && npm run lint'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

      - id: typescript
        name: TypeScript Check
        entry: bash -c 'cd apps/web && npx tsc --noEmit'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: ^infrastructure/k8s/
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
