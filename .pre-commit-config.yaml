# Pre-commit hooks for LlamaTrade
# Install: pip install pre-commit && pre-commit install

repos:
  # Check for suppression comments (must run first)
  - repo: local
    hooks:
      - id: no-suppressions
        name: No lint/type suppression comments
        entry: ./scripts/check-no-suppressions.sh
        language: script
        files: ^(services|libs|tests)/.*\.py$
        pass_filenames: false

  # Python linting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      # Generated code is skipped via force-exclude + extend-exclude in
      # pyproject.toml (the single source of truth), which applies even though
      # pre-commit passes explicit filenames — no per-hook exclude needed.
      - id: ruff
        args: [--fix, --ignore-noqa, --config=pyproject.toml]
        files: ^(services|libs|tests)/
      - id: ruff-format
        args: [--config=pyproject.toml]
        files: ^(services|libs|tests)/

  # Python type checking with Pyright (uses config from pyproject.toml)
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: npx pyright
        language: system
        files: ^(services|libs)/.*\.py$
        pass_filenames: false

  # Strategy service: run its test suite, which enforces the >=80% coverage gate
  # (--cov-fail-under=80 lives in services/strategy/pyproject.toml addopts).
  # The Docker-backed tenant-isolation test skips cleanly when Docker is absent.
  # Runs only when strategy Python sources/tests change.
  - repo: local
    hooks:
      - id: strategy-tests-coverage
        name: Strategy tests (>=80% coverage)
        entry: bash -c 'cd services/strategy && ../../.venv/bin/python -m pytest -q'
        language: system
        files: ^services/strategy/.*\.py$
        pass_filenames: false

  # Backtest service: run its test suite, which enforces the >=80% coverage gate
  # (--cov-fail-under=80 lives in services/backtest/pyproject.toml addopts).
  # Runs only when backtest Python sources/tests change.
  - repo: local
    hooks:
      - id: backtest-tests-coverage
        name: Backtest tests (>=80% coverage)
        entry: bash -c 'cd services/backtest && ../../.venv/bin/python -m pytest -q'
        language: system
        files: ^services/backtest/.*\.py$
        pass_filenames: false

  # Portfolio service (book-of-record ledger): run its FULL suite with coverage,
  # enforcing the >=80% gate (fail_under lives in services/portfolio/
  # pyproject.toml [tool.coverage.report]). The gate needs the Docker-backed
  # integration tests — the IO shells (servicers/writer/ingestion) are only
  # covered there — so this requires Docker. Runs only when portfolio code changes.
  - repo: local
    hooks:
      - id: portfolio-tests-coverage
        name: Portfolio tests (>=80% coverage, requires Docker)
        entry: bash -c 'cd services/portfolio && ../../.venv/bin/python -m pytest tests --cov=src -q'
        language: system
        files: ^services/portfolio/.*\.py$
        pass_filenames: false

  # Trading service: run its test suite, which enforces the >=80% coverage gate
  # (--cov-fail-under=80 lives in services/trading/pyproject.toml addopts).
  # Runs only when trading Python sources/tests change.
  - repo: local
    hooks:
      - id: trading-tests-coverage
        name: Trading tests (>=80% coverage)
        entry: bash -c 'cd services/trading && ../../.venv/bin/python -m pytest -q'
        language: system
        files: ^services/trading/.*\.py$
        pass_filenames: false

  # Frontend linting
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: bash -c 'cd apps/web && npm run lint'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

      - id: typescript
        name: TypeScript Check
        entry: bash -c 'cd apps/web && npx tsc --noEmit'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: ^infrastructure/k8s/
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
