_format_version: "3.0"
_transform: true

# =============================================================================
# CONSUMERS (API Keys and JWT Consumers)
# =============================================================================
consumers:
  - username: internal-services
    custom_id: internal
    tags:
      - internal
      - service-mesh

# JWT credentials for internal services
jwt_secrets:
  - consumer: internal-services
    key: internal-service-key
    algorithm: HS256

# =============================================================================
# UPSTREAMS (gRPC only + Billing HTTP for Stripe webhooks)
# =============================================================================
upstreams:
  # ---------------------------------------------------------------------------
  # Billing HTTP upstream (for Stripe webhooks only)
  # ---------------------------------------------------------------------------
  - name: billing-http-upstream
    targets:
      - target: billing:8881
        weight: 100
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3

  # ---------------------------------------------------------------------------
  # gRPC Upstreams
  # ---------------------------------------------------------------------------
  - name: auth-grpc-upstream
    targets:
      - target: auth:8810
        weight: 100

  - name: strategy-grpc-upstream
    targets:
      - target: strategy:8820
        weight: 100

  - name: backtest-grpc-upstream
    targets:
      - target: backtest:8830
        weight: 100

  - name: market-data-grpc-upstream
    targets:
      - target: market-data:8840
        weight: 100

  - name: trading-grpc-upstream
    targets:
      - target: trading:8850
        weight: 100

  - name: portfolio-grpc-upstream
    targets:
      - target: portfolio:8860
        weight: 100

  - name: notification-grpc-upstream
    targets:
      - target: notification:8870
        weight: 100

  - name: billing-grpc-upstream
    targets:
      - target: billing:8880
        weight: 100

  # ---------------------------------------------------------------------------
  # WebSocket Upstreams (for real-time streaming)
  # ---------------------------------------------------------------------------
  - name: market-data-ws-upstream
    targets:
      - target: market-data:8041
        weight: 100

  - name: backtest-ws-upstream
    targets:
      - target: backtest:8031
        weight: 100

# =============================================================================
# SERVICES
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Billing HTTP (Stripe Webhook only - required by Stripe)
  # ---------------------------------------------------------------------------
  - name: billing-webhook-service
    host: billing-http-upstream
    port: 8881
    protocol: http
    retries: 3
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: stripe-webhook-route
        paths:
          - /api/billing/webhook
          - /api/webhooks/stripe
        strip_path: false
        methods:
          - POST
        tags:
          - webhook
          - billing
    plugins:
      - name: rate-limiting
        config:
          minute: 50
          hour: 500
          policy: local

  # ---------------------------------------------------------------------------
  # gRPC-Web Services (all API calls go through gRPC)
  # ---------------------------------------------------------------------------
  - name: grpc-auth-service
    host: auth-grpc-upstream
    port: 8810
    protocol: grpc
    retries: 3
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: grpc-auth-routes
        paths:
          - /grpc/llamatrade.v1.AuthService
        protocols:
          - http
          - https
        strip_path: false
        tags:
          - grpc
          - auth
    plugins:
      - name: grpc-web
      - name: rate-limiting
        config:
          minute: 60
          hour: 1000
          policy: local

  - name: grpc-strategy-service
    host: strategy-grpc-upstream
    port: 8820
    protocol: grpc
    retries: 3
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: grpc-strategy-routes
        paths:
          - /grpc/llamatrade.v1.StrategyService
        protocols:
          - http
          - https
        strip_path: false
        tags:
          - grpc
          - strategy
    plugins:
      - name: grpc-web
      - name: rate-limiting
        config:
          minute: 200
          hour: 5000
          policy: local
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify:
            - exp

  - name: grpc-backtest-service
    host: backtest-grpc-upstream
    port: 8830
    protocol: grpc
    retries: 2
    connect_timeout: 5000
    write_timeout: 300000
    read_timeout: 300000
    routes:
      - name: grpc-backtest-routes
        paths:
          - /grpc/llamatrade.v1.BacktestService
        protocols:
          - http
          - https
        strip_path: false
        tags:
          - grpc
          - backtest
    plugins:
      - name: grpc-web
      - name: rate-limiting
        config:
          minute: 20
          hour: 200
          policy: local
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify:
            - exp

  - name: grpc-market-data-service
    host: market-data-grpc-upstream
    port: 8840
    protocol: grpc
    retries: 3
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: grpc-market-data-routes
        paths:
          - /grpc/llamatrade.v1.MarketDataService
        protocols:
          - http
          - https
        strip_path: false
        tags:
          - grpc
          - market-data
    plugins:
      - name: grpc-web
      - name: rate-limiting
        config:
          minute: 500
          hour: 10000
          policy: local
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify:
            - exp

  - name: grpc-trading-service
    host: trading-grpc-upstream
    port: 8850
    protocol: grpc
    retries: 1
    connect_timeout: 5000
    write_timeout: 30000
    read_timeout: 30000
    routes:
      - name: grpc-trading-routes
        paths:
          - /grpc/llamatrade.v1.TradingService
        protocols:
          - http
          - https
        strip_path: false
        tags:
          - grpc
          - trading
          - critical
    plugins:
      - name: grpc-web
      - name: rate-limiting
        config:
          minute: 100
          hour: 2000
          policy: local
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify:
            - exp

  - name: grpc-portfolio-service
    host: portfolio-grpc-upstream
    port: 8860
    protocol: grpc
    retries: 3
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: grpc-portfolio-routes
        paths:
          - /grpc/llamatrade.v1.PortfolioService
        protocols:
          - http
          - https
        strip_path: false
        tags:
          - grpc
          - portfolio
    plugins:
      - name: grpc-web
      - name: rate-limiting
        config:
          minute: 300
          hour: 5000
          policy: local
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify:
            - exp

  - name: grpc-notification-service
    host: notification-grpc-upstream
    port: 8870
    protocol: grpc
    retries: 3
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: grpc-notification-routes
        paths:
          - /grpc/llamatrade.v1.NotificationService
        protocols:
          - http
