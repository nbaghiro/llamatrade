            - exp

# =============================================================================
# GLOBAL PLUGINS
# =============================================================================
plugins:
  # ---------------------------------------------------------------------------
  # CORS (Global)
  # ---------------------------------------------------------------------------
  - name: cors
    config:
      origins:
        - http://localhost:8800
        - https://llamatrade.com
        - https://staging.llamatrade.com
        - https://*.llamatrade.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-Type
        - X-Request-ID
        - X-Tenant-ID
        - Connect-Protocol-Version
        - Connect-Timeout-Ms
        - Grpc-Timeout
        - X-Grpc-Web
        - X-User-Agent
      exposed_headers:
        - X-Request-ID
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
        - Grpc-Status
        - Grpc-Message
        - Grpc-Status-Details-Bin
      credentials: true
      max_age: 3600
      preflight_continue: false

  # ---------------------------------------------------------------------------
  # Request ID / Correlation ID
  # ---------------------------------------------------------------------------
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  # ---------------------------------------------------------------------------
  # Request Transformer (Add headers)
  # ---------------------------------------------------------------------------
  - name: request-transformer
    config:
      add:
        headers:
          - X-Gateway-Version:1.0.0
          - X-Forwarded-By:kong

  # ---------------------------------------------------------------------------
  # Response Transformer
  # ---------------------------------------------------------------------------
  - name: response-transformer
    config:
      add:
        headers:
          - X-Served-By:llamatrade-gateway
      remove:
        headers:
          - Server

  # ---------------------------------------------------------------------------
  # Logging (stdout for container logs)
  # ---------------------------------------------------------------------------
  - name: file-log
    config:
      path: /dev/stdout
      reopen: true

  # ---------------------------------------------------------------------------
  # Prometheus metrics
  # ---------------------------------------------------------------------------
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
