        strip_path: false
        tags:
          - grpc
          - notification
    plugins:
      - name: grpc-web
      - name: rate-limiting
        config:
          minute: 100
          hour: 2000
          policy: local
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify:
            - exp

  - name: grpc-billing-service
    host: billing-grpc-upstream
    port: 8880
    protocol: grpc
    retries: 3
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: grpc-billing-routes
        paths:
          - /grpc/llamatrade.v1.BillingService
        protocols:
          - http
          - https
        strip_path: false
        tags:
          - grpc
          - billing
    plugins:
      - name: grpc-web
      - name: rate-limiting
        config:
          minute: 50
          hour: 500
          policy: local
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify:
            - exp

  # ---------------------------------------------------------------------------
  # WebSocket Services (real-time streaming)
  # ---------------------------------------------------------------------------
  - name: market-data-ws-service
    host: market-data-ws-upstream
    port: 8041
    protocol: http
    retries: 1
    connect_timeout: 5000
    write_timeout: 300000
    read_timeout: 300000
    routes:
      - name: market-data-ws-route
        paths:
          - /ws/market-data
        protocols:
