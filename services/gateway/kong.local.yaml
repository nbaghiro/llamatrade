# =============================================================================
# GLOBAL PLUGINS
# =============================================================================
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:47333
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Request-ID
        - X-Tenant-ID
      credentials: true
      max_age: 3600
