syntax = "proto3";

package llamatrade;

import "common.proto";

option java_multiple_files = true;
option java_package = "com.llamatrade.api";

// =============================================================================
// ENUMS
// =============================================================================

// Notification type
enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_INFO = 1;
  NOTIFICATION_TYPE_SUCCESS = 2;
  NOTIFICATION_TYPE_WARNING = 3;
  NOTIFICATION_TYPE_ERROR = 4;
  NOTIFICATION_TYPE_ALERT = 5;
  NOTIFICATION_TYPE_ORDER = 6;
  NOTIFICATION_TYPE_TRADE = 7;
  NOTIFICATION_TYPE_SYSTEM = 8;
}

// Channel type
enum ChannelType {
  CHANNEL_TYPE_UNSPECIFIED = 0;
  CHANNEL_TYPE_EMAIL = 1;
  CHANNEL_TYPE_SMS = 2;
  CHANNEL_TYPE_PUSH = 3;
  CHANNEL_TYPE_WEBHOOK = 4;
  CHANNEL_TYPE_SLACK = 5;
  CHANNEL_TYPE_DISCORD = 6;
  CHANNEL_TYPE_TELEGRAM = 7;
}

// Alert condition type
enum AlertConditionType {
  ALERT_CONDITION_TYPE_UNSPECIFIED = 0;
  ALERT_CONDITION_TYPE_PRICE_ABOVE = 1;
  ALERT_CONDITION_TYPE_PRICE_BELOW = 2;
  ALERT_CONDITION_TYPE_PRICE_CHANGE_PERCENT = 3;
  ALERT_CONDITION_TYPE_VOLUME_ABOVE = 4;
  ALERT_CONDITION_TYPE_RSI_ABOVE = 5;
  ALERT_CONDITION_TYPE_RSI_BELOW = 6;
  ALERT_CONDITION_TYPE_ORDER_FILLED = 7;
  ALERT_CONDITION_TYPE_STRATEGY_SIGNAL = 8;
}

// =============================================================================
// MESSAGES
// =============================================================================

// Notification
message Notification {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  NotificationType type = 4;
  string title = 5;
  string message = 6;
  bool is_read = 7;
  map<string, string> metadata = 8;  // Additional context (order_id, symbol, etc.)
  Timestamp created_at = 9;
  Timestamp read_at = 10;
}

// Alert definition
message Alert {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string name = 4;
  string description = 5;
  bool is_active = 6;

  // Condition
  AlertCondition condition = 7;

  // Delivery channels
  repeated ChannelType channels = 8;

  // Cooldown to prevent spam
  int32 cooldown_minutes = 9;

  // Stats
  int32 times_triggered = 10;
  Timestamp last_triggered_at = 11;

  Timestamp created_at = 12;
  Timestamp updated_at = 13;
}

// Alert condition
message AlertCondition {
  AlertConditionType type = 1;
  string symbol = 2;  // For price/volume alerts
  Decimal threshold = 3;
  string strategy_id = 4;  // For strategy signal alerts
}

// Notification channel configuration
message Channel {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  ChannelType type = 4;
  bool is_enabled = 5;
  bool is_verified = 6;
  map<string, string> config = 7;  // email address, phone number, webhook URL, etc.
  Timestamp created_at = 8;
  Timestamp updated_at = 9;
}

// =============================================================================
// REQUESTS & RESPONSES
// =============================================================================

// List notifications
message ListNotificationsRequest {
  TenantContext context = 1;
  bool unread_only = 2;
  repeated NotificationType types = 3;
  PaginationRequest pagination = 4;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  PaginationResponse pagination = 2;
  int32 unread_count = 3;
}

// Mark notification as read
message MarkAsReadRequest {
  TenantContext context = 1;
  string notification_id = 2;
  bool mark_all = 3;  // If true, marks all notifications as read
}

message MarkAsReadResponse {
  int32 marked_count = 1;
}

// List alerts
message ListAlertsRequest {
  TenantContext context = 1;
  bool active_only = 2;
}

message ListAlertsResponse {
  repeated Alert alerts = 1;
}

// Create alert
message CreateAlertRequest {
  TenantContext context = 1;
  string name = 2;
  string description = 3;
  AlertCondition condition = 4;
  repeated ChannelType channels = 5;
  int32 cooldown_minutes = 6;
}

message CreateAlertResponse {
  Alert alert = 1;
}

// Delete alert
message DeleteAlertRequest {
  TenantContext context = 1;
  string alert_id = 2;
}

message DeleteAlertResponse {
  bool success = 1;
}

// Toggle alert (enable/disable)
message ToggleAlertRequest {
  TenantContext context = 1;
  string alert_id = 2;
  bool is_active = 3;
}

message ToggleAlertResponse {
  Alert alert = 1;
}

// List channels
message ListChannelsRequest {
  TenantContext context = 1;
}

message ListChannelsResponse {
  repeated Channel channels = 1;
}

// Update channel
message UpdateChannelRequest {
  TenantContext context = 1;
  ChannelType type = 2;
  bool is_enabled = 3;
  map<string, string> config = 4;
}

message UpdateChannelResponse {
  Channel channel = 1;
}

// Test channel
message TestChannelRequest {
  TenantContext context = 1;
  ChannelType type = 2;
}

message TestChannelResponse {
  bool success = 1;
  string message = 2;
}

// =============================================================================
// SERVICE
// =============================================================================

service NotificationService {
  // Notifications
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);

  // Alerts
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);
  rpc CreateAlert(CreateAlertRequest) returns (CreateAlertResponse);
  rpc DeleteAlert(DeleteAlertRequest) returns (DeleteAlertResponse);
  rpc ToggleAlert(ToggleAlertRequest) returns (ToggleAlertResponse);

  // Channels
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);
  rpc TestChannel(TestChannelRequest) returns (TestChannelResponse);
}
