syntax = "proto3";

package llamatrade;

import "common.proto";

option java_multiple_files = true;
option java_package = "com.llamatrade.api";

// =============================================================================
// MESSAGES
// =============================================================================

// User information
message User {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  repeated string roles = 6;
  bool is_active = 7;
  Timestamp created_at = 8;
  Timestamp last_login = 9;
}

// Tenant (organization) information
message Tenant {
  string id = 1;
  string name = 2;
  string plan_id = 3;
  bool is_active = 4;
  Timestamp created_at = 5;
  map<string, string> settings = 6;
}

// API Key information
message APIKey {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string prefix = 4;  // First 8 chars for identification
  repeated string scopes = 5;
  Timestamp created_at = 6;
  Timestamp expires_at = 7;
  Timestamp last_used_at = 8;
  bool is_active = 9;
}

// Alpaca API credentials (encrypted at rest)
message AlpacaCredentials {
  string id = 1;
  string name = 2;
  string api_key = 3;         // Decrypted for client use
  string api_secret = 4;      // Decrypted for client use
  bool is_paper = 5;
  bool is_active = 6;
  Timestamp created_at = 7;
}

// Alpaca credentials list item (key masked)
message AlpacaCredentialsListItem {
  string id = 1;
  string name = 2;
  string api_key_prefix = 3;  // First 8 chars only
  bool is_paper = 4;
  bool is_active = 5;
  Timestamp created_at = 6;
}

// =============================================================================
// REQUESTS & RESPONSES
// =============================================================================

// Token validation (called by other services)
message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  TenantContext context = 2;
  Timestamp expires_at = 3;
  string token_type = 4;  // "access", "refresh", "api_key"
}

// API Key validation
message ValidateAPIKeyRequest {
  string api_key = 1;
  repeated string required_scopes = 2;
}

message ValidateAPIKeyResponse {
  bool valid = 1;
  TenantContext context = 2;
  repeated string granted_scopes = 3;
  APIKey key_info = 4;
}

// Get user by ID (internal service call)
message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

// Get tenant by ID
message GetTenantRequest {
  string tenant_id = 1;
}

message GetTenantResponse {
  Tenant tenant = 1;
}

// Check permissions
message CheckPermissionRequest {
  TenantContext context = 1;
  string resource = 2;
  string action = 3;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string reason = 2;
}

// Refresh token
message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  Timestamp access_token_expires_at = 3;
  Timestamp refresh_token_expires_at = 4;
}

// Login
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
  Timestamp access_token_expires_at = 4;
  Timestamp refresh_token_expires_at = 5;
}

// Register
message RegisterRequest {
  string tenant_name = 1;
  string email = 2;
  string password = 3;
  string first_name = 4;
  string last_name = 5;
}

message RegisterResponse {
  User user = 1;
  Tenant tenant = 2;
  string message = 3;
}

// Get current user (from token)
message GetCurrentUserRequest {
  // Token is passed via metadata/headers
}

message GetCurrentUserResponse {
  User user = 1;
  Tenant tenant = 2;
}

// Logout
message LogoutRequest {
  // Token is passed via metadata/headers
}

message LogoutResponse {
  bool success = 1;
}

// Change password
message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
  // Token is passed via metadata/headers to identify user
}

message ChangePasswordResponse {
  bool success = 1;
  string message = 2;
}

// =============================================================================
// ALPACA CREDENTIALS
// =============================================================================

// Create Alpaca credentials
message CreateAlpacaCredentialsRequest {
  string name = 1;
  string api_key = 2;
  string api_secret = 3;
  bool is_paper = 4;
  // tenant_id extracted from auth token
}

message CreateAlpacaCredentialsResponse {
  AlpacaCredentials credentials = 1;
}

// Get Alpaca credentials by ID
message GetAlpacaCredentialsRequest {
  string credentials_id = 1;
  // tenant_id extracted from auth token
}

message GetAlpacaCredentialsResponse {
  AlpacaCredentials credentials = 1;
}

// List Alpaca credentials for tenant
message ListAlpacaCredentialsRequest {
  // tenant_id extracted from auth token
}

message ListAlpacaCredentialsResponse {
  repeated AlpacaCredentialsListItem credentials = 1;
}

// Delete Alpaca credentials
message DeleteAlpacaCredentialsRequest {
  string credentials_id = 1;
  // tenant_id extracted from auth token
}

message DeleteAlpacaCredentialsResponse {
  bool success = 1;
}

// =============================================================================
// SERVICE
// =============================================================================

service AuthService {
  // Public endpoints (no auth required)
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Token operations
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // Current user (requires auth)
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);

  // Password management (requires auth)
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);

  // Token validation (high-frequency, called by all services)
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ValidateAPIKey(ValidateAPIKeyRequest) returns (ValidateAPIKeyResponse);

  // User/tenant lookup
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);

  // Authorization
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);

  // Alpaca credentials management (requires auth)
  rpc CreateAlpacaCredentials(CreateAlpacaCredentialsRequest) returns (CreateAlpacaCredentialsResponse);
  rpc GetAlpacaCredentials(GetAlpacaCredentialsRequest) returns (GetAlpacaCredentialsResponse);
  rpc ListAlpacaCredentials(ListAlpacaCredentialsRequest) returns (ListAlpacaCredentialsResponse);
  rpc DeleteAlpacaCredentials(DeleteAlpacaCredentialsRequest) returns (DeleteAlpacaCredentialsResponse);
}
