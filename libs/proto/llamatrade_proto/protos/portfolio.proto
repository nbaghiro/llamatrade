syntax = "proto3";

package llamatrade;

import "common.proto";
import "trading.proto";

option java_multiple_files = true;
option java_package = "com.llamatrade.api";

// =============================================================================
// ENUMS
// =============================================================================

// Transaction type
enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_DEPOSIT = 1;
  TRANSACTION_TYPE_WITHDRAWAL = 2;
  TRANSACTION_TYPE_BUY = 3;
  TRANSACTION_TYPE_SELL = 4;
  TRANSACTION_TYPE_DIVIDEND = 5;
  TRANSACTION_TYPE_INTEREST = 6;
  TRANSACTION_TYPE_FEE = 7;
  TRANSACTION_TYPE_TRANSFER_IN = 8;
  TRANSACTION_TYPE_TRANSFER_OUT = 9;
}

// Time period for returns
enum TimePeriod {
  TIME_PERIOD_UNSPECIFIED = 0;
  TIME_PERIOD_1D = 1;   // 1 Day
  TIME_PERIOD_1W = 2;   // 1 Week
  TIME_PERIOD_1M = 3;   // 1 Month
  TIME_PERIOD_3M = 4;   // 3 Months
  TIME_PERIOD_6M = 5;   // 6 Months
  TIME_PERIOD_1Y = 6;   // 1 Year
  TIME_PERIOD_YTD = 7;  // Year to Date
  TIME_PERIOD_ALL = 8;  // All Time
}

// =============================================================================
// MESSAGES
// =============================================================================

// Portfolio overview
message Portfolio {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string name = 4;

  // Balances
  Decimal total_value = 5;
  Decimal cash_balance = 6;
  Decimal positions_value = 7;

  // Performance
  Decimal total_return = 8;
  Decimal total_return_percent = 9;
  Decimal day_return = 10;
  Decimal day_return_percent = 11;

  // Risk metrics
  Decimal buying_power = 12;
  Decimal margin_used = 13;

  // Linked accounts
  repeated string trading_session_ids = 14;

  // Metadata
  Timestamp created_at = 15;
  Timestamp updated_at = 16;
}

// Portfolio performance metrics
message PerformanceMetrics {
  // Time-weighted returns
  Decimal total_return = 1;
  Decimal ytd_return = 2;
  Decimal mtd_return = 3;
  Decimal wtd_return = 4;

  // Risk metrics
  Decimal volatility = 5;
  Decimal sharpe_ratio = 6;
  Decimal max_drawdown = 7;
  Decimal beta = 8;

  // Benchmark comparison
  Decimal benchmark_return = 9;
  Decimal alpha = 10;

  // Portfolio composition
  int32 total_positions = 11;
  Decimal concentration_top5 = 12;  // % in top 5 holdings
}

// Performance data point for time series
message PerformancePoint {
  Timestamp timestamp = 1;
  Decimal portfolio_value = 2;
  Decimal benchmark_value = 3;
  Decimal daily_return = 4;
  Decimal cumulative_return = 5;
  Decimal drawdown = 6;
}

// Transaction record
message Transaction {
  string id = 1;
  string portfolio_id = 2;
  TransactionType type = 3;
  string symbol = 4;  // For trades
  Decimal quantity = 5;
  Decimal price = 6;
  Decimal amount = 7;  // Total amount (quantity * price + fees)
  Decimal fees = 8;
  string description = 9;
  string reference_id = 10;  // Order ID, transfer ID, etc.
  Timestamp timestamp = 11;
}

// Asset allocation breakdown
message AssetAllocation {
  string category = 1;  // "Stocks", "Bonds", "Cash", etc.
  Decimal value = 2;
  Decimal percentage = 3;
  repeated AllocationItem items = 4;
}

message AllocationItem {
  string symbol = 1;
  string name = 2;
  Decimal value = 3;
  Decimal percentage = 4;
  Decimal return_percent = 5;
}

// =============================================================================
// STRATEGY PERFORMANCE MESSAGES
// =============================================================================

// Summary of an executed strategy's performance
message StrategyPerformanceSummary {
  string execution_id = 1;
  string strategy_id = 2;
  string strategy_name = 3;

  // Execution info
  ExecutionMode mode = 4;
  ExecutionStatus status = 5;
  string color = 6;  // UI color for charts

  // Capital and positions
  Decimal allocated_capital = 7;
  Decimal current_value = 8;
  int32 positions_count = 9;

  // Period returns (as decimal, e.g., 0.12 = 12%)
  StrategyPeriodReturns returns = 10;

  // Timestamps
  Timestamp started_at = 11;
  Timestamp updated_at = 12;
}

// Returns for various time periods
message StrategyPeriodReturns {
  Decimal return_1d = 1;   // 1 Day
  Decimal return_1w = 2;   // 1 Week
  Decimal return_1m = 3;   // 1 Month
  Decimal return_3m = 4;   // 3 Months
  Decimal return_6m = 5;   // 6 Months
  Decimal return_1y = 6;   // 1 Year
  Decimal return_ytd = 7;  // Year to Date
  Decimal return_all = 8;  // All Time
}

// Point in equity curve time series
message StrategyEquityPoint {
  Timestamp timestamp = 1;
  Decimal equity = 2;           // Absolute value
  Decimal return_percent = 3;   // Cumulative return as percentage
  Decimal drawdown = 4;         // Current drawdown percentage
  Decimal benchmark_value = 5;  // Optional benchmark value at this point
}

// Detailed live metrics for a strategy
message StrategyLiveMetrics {
  // Risk-adjusted returns
  Decimal sharpe_ratio = 1;
  Decimal sortino_ratio = 2;
  Decimal calmar_ratio = 3;

  // Risk metrics
  Decimal max_drawdown = 4;
  Decimal current_drawdown = 5;
  Decimal volatility = 6;

  // Trade statistics
  int32 total_trades = 7;
  int32 winning_trades = 8;
  int32 losing_trades = 9;
  Decimal win_rate = 10;
  Decimal profit_factor = 11;
  Decimal average_win = 12;
  Decimal average_loss = 13;

  // Capital metrics
  Decimal starting_capital = 14;
  Decimal current_equity = 15;
  Decimal peak_equity = 16;
  Decimal total_pnl = 17;

  // Benchmark comparison
  string benchmark_symbol = 18;
  Decimal alpha = 19;
  Decimal beta = 20;
  Decimal correlation = 21;

  // Timestamps
  Timestamp calculated_at = 22;
}

// Benchmark data for comparison
message BenchmarkData {
  string symbol = 1;
  string name = 2;
  repeated StrategyEquityPoint equity_curve = 3;
  Decimal total_return = 4;
}

// =============================================================================
// REQUESTS & RESPONSES
// =============================================================================

// Get portfolio
message GetPortfolioRequest {
  TenantContext context = 1;
  string portfolio_id = 2;
}

message GetPortfolioResponse {
  Portfolio portfolio = 1;
  repeated Position positions = 2;
}

// List portfolios
message ListPortfoliosRequest {
  TenantContext context = 1;
  PaginationRequest pagination = 2;
}

message ListPortfoliosResponse {
  repeated Portfolio portfolios = 1;
  PaginationResponse pagination = 2;
}

// Get performance
message GetPerformanceRequest {
  TenantContext context = 1;
  string portfolio_id = 2;
  TimeRange time_range = 3;
  string benchmark_symbol = 4;  // e.g., "SPY"
}

message GetPerformanceResponse {
  PerformanceMetrics metrics = 1;
  repeated PerformancePoint time_series = 2;
}

// List transactions
message ListTransactionsRequest {
  TenantContext context = 1;
  string portfolio_id = 2;
  TimeRange time_range = 3;
  repeated TransactionType types = 4;
  string symbol = 5;
  PaginationRequest pagination = 6;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  PaginationResponse pagination = 2;
}

// Record transaction (internal use)
message RecordTransactionRequest {
  TenantContext context = 1;
  string portfolio_id = 2;
  TransactionType type = 3;
  string symbol = 4;
  Decimal quantity = 5;
  Decimal price = 6;
  Decimal fees = 7;
  string description = 8;
  string reference_id = 9;
}

message RecordTransactionResponse {
  Transaction transaction = 1;
}

// Get asset allocation
message GetAssetAllocationRequest {
  TenantContext context = 1;
  string portfolio_id = 2;
}

message GetAssetAllocationResponse {
  repeated AssetAllocation allocations = 1;
}

// Get portfolio positions
message GetPositionsRequest {
  TenantContext context = 1;
  string portfolio_id = 2;
}

message GetPositionsResponse {
  repeated Position positions = 1;
}

// Sync portfolio with trading session
message SyncPortfolioRequest {
  TenantContext context = 1;
  string portfolio_id = 2;
  string trading_session_id = 3;
}

message SyncPortfolioResponse {
  Portfolio portfolio = 1;
  int32 positions_synced = 2;
  int32 transactions_recorded = 3;
}

// =============================================================================
// STRATEGY PERFORMANCE REQUESTS & RESPONSES
// =============================================================================

// List all deployed strategies with performance summaries
message ListStrategyPerformanceRequest {
  TenantContext context = 1;
  // Optional filters
  ExecutionMode mode = 2;           // Filter by paper/live
  ExecutionStatus status = 3;       // Filter by running/paused/stopped
  PaginationRequest pagination = 4;
}

message ListStrategyPerformanceResponse {
  repeated StrategyPerformanceSummary strategies = 1;
  // Aggregate metrics across all strategies
  Decimal total_allocated = 2;
  Decimal total_current_value = 3;
  Decimal combined_return = 4;
  PaginationResponse pagination = 5;
}

// Get detailed performance for a single strategy
message GetStrategyPerformanceRequest {
  TenantContext context = 1;
  string execution_id = 2;
}

message GetStrategyPerformanceResponse {
  StrategyPerformanceSummary summary = 1;
  StrategyLiveMetrics metrics = 2;
  repeated Position positions = 3;  // Current open positions
}

// Get equity curve time series for a strategy
message GetStrategyEquityCurveRequest {
  TenantContext context = 1;
  string execution_id = 2;
  TimeRange time_range = 3;
  string benchmark_symbol = 4;      // Optional benchmark (e.g., "SPY")
  int32 sample_interval_minutes = 5; // Downsampling interval (0 = all points)
}

message GetStrategyEquityCurveResponse {
  repeated StrategyEquityPoint equity_curve = 1;
  BenchmarkData benchmark = 2;      // Benchmark data if requested
  StrategyPeriodReturns period_returns = 3;
}

// =============================================================================
// SERVICE
// =============================================================================

service PortfolioService {
  // Portfolio management
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc ListPortfolios(ListPortfoliosRequest) returns (ListPortfoliosResponse);

  // Performance
  rpc GetPerformance(GetPerformanceRequest) returns (GetPerformanceResponse);
  rpc GetAssetAllocation(GetAssetAllocationRequest) returns (GetAssetAllocationResponse);

  // Positions
  rpc GetPositions(GetPositionsRequest) returns (GetPositionsResponse);

  // Transactions
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc RecordTransaction(RecordTransactionRequest) returns (RecordTransactionResponse);

  // Sync with trading
  rpc SyncPortfolio(SyncPortfolioRequest) returns (SyncPortfolioResponse);

  // Strategy Performance
  rpc ListStrategyPerformance(ListStrategyPerformanceRequest) returns (ListStrategyPerformanceResponse);
  rpc GetStrategyPerformance(GetStrategyPerformanceRequest) returns (GetStrategyPerformanceResponse);
  rpc GetStrategyEquityCurve(GetStrategyEquityCurveRequest) returns (GetStrategyEquityCurveResponse);
}
