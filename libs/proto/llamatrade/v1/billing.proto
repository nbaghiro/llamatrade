syntax = "proto3";

package llamatrade.v1;

import "llamatrade/v1/common.proto";

option java_multiple_files = true;
option java_package = "com.llamatrade.api.v1";

// =============================================================================
// ENUMS
// =============================================================================

// Subscription status
enum SubscriptionStatus {
  SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
  SUBSCRIPTION_STATUS_ACTIVE = 1;
  SUBSCRIPTION_STATUS_PAST_DUE = 2;
  SUBSCRIPTION_STATUS_CANCELED = 3;
  SUBSCRIPTION_STATUS_TRIALING = 4;
  SUBSCRIPTION_STATUS_PAUSED = 5;
}

// Plan tier
enum PlanTier {
  PLAN_TIER_UNSPECIFIED = 0;
  PLAN_TIER_FREE = 1;
  PLAN_TIER_STARTER = 2;
  PLAN_TIER_PROFESSIONAL = 3;
  PLAN_TIER_ENTERPRISE = 4;
}

// Billing interval
enum BillingInterval {
  BILLING_INTERVAL_UNSPECIFIED = 0;
  BILLING_INTERVAL_MONTHLY = 1;
  BILLING_INTERVAL_YEARLY = 2;
}

// =============================================================================
// MESSAGES
// =============================================================================

// Subscription plan
message Plan {
  string id = 1;
  string name = 2;
  PlanTier tier = 3;
  string description = 4;

  // Pricing
  Money monthly_price = 5;
  Money yearly_price = 6;

  // Limits
  int32 max_strategies = 7;
  int32 max_backtests_per_month = 8;
  int32 max_live_sessions = 9;
  int32 data_retention_days = 10;

  // Features
  repeated string features = 11;
  bool api_access = 12;
  bool priority_support = 13;
}

// Subscription
message Subscription {
  string id = 1;
  string tenant_id = 2;
  string plan_id = 3;
  Plan plan = 4;

  SubscriptionStatus status = 5;
  BillingInterval interval = 6;

  // Billing details
  Money current_price = 7;
  Timestamp current_period_start = 8;
  Timestamp current_period_end = 9;

  // Trial info
  bool is_trial = 10;
  Timestamp trial_end = 11;

  // Cancellation
  bool cancel_at_period_end = 12;
  Timestamp canceled_at = 13;
  string cancellation_reason = 14;

  // External references
  string stripe_subscription_id = 15;
  string stripe_customer_id = 16;

  // Timestamps
  Timestamp created_at = 17;
  Timestamp updated_at = 18;
}

// Usage metrics
message Usage {
  string tenant_id = 1;
  string period_id = 2;  // e.g., "2024-01"

  // Strategy usage
  int32 strategies_created = 3;
  int32 active_strategies = 4;

  // Backtest usage
  int32 backtests_run = 5;
  int32 backtest_compute_minutes = 6;

  // Trading usage
  int32 live_sessions = 7;
  int32 orders_placed = 8;

  // Data usage
  int64 market_data_requests = 9;
  int64 storage_bytes = 10;

  // API usage
  int64 api_calls = 11;

  Timestamp period_start = 12;
  Timestamp period_end = 13;
}

// Invoice
message Invoice {
  string id = 1;
  string tenant_id = 2;
  string subscription_id = 3;

  Money amount = 4;
  Money amount_paid = 5;
  Money amount_remaining = 6;

  string status = 7;  // "draft", "open", "paid", "void", "uncollectible"

  Timestamp period_start = 8;
  Timestamp period_end = 9;
  Timestamp due_date = 10;
  Timestamp paid_at = 11;

  string pdf_url = 12;
  string stripe_invoice_id = 13;

  repeated InvoiceItem items = 14;
}

message InvoiceItem {
  string description = 1;
  int32 quantity = 2;
  Money unit_price = 3;
  Money amount = 4;
}

// Payment method
message PaymentMethod {
  string id = 1;
  string type = 2;  // "card", "bank_account"
  bool is_default = 3;

  // Card details (if type == "card")
  string card_brand = 4;
  string card_last4 = 5;
  int32 card_exp_month = 6;
  int32 card_exp_year = 7;

  Timestamp created_at = 8;
}

// =============================================================================
// REQUESTS & RESPONSES
// =============================================================================

// Get subscription
message GetSubscriptionRequest {
  TenantContext context = 1;
}

message GetSubscriptionResponse {
  Subscription subscription = 1;
}

// Create subscription
message CreateSubscriptionRequest {
  TenantContext context = 1;
  string plan_id = 2;
  BillingInterval interval = 3;
  string payment_method_id = 4;
  string promo_code = 5;
}

message CreateSubscriptionResponse {
  Subscription subscription = 1;
  string checkout_url = 2;  // If additional payment setup needed
}

// Update subscription (change plan)
message UpdateSubscriptionRequest {
  TenantContext context = 1;
  string plan_id = 2;
  BillingInterval interval = 3;
  bool prorate = 4;
}

message UpdateSubscriptionResponse {
  Subscription subscription = 1;
}

// Cancel subscription
message CancelSubscriptionRequest {
  TenantContext context = 1;
  bool cancel_immediately = 2;  // vs cancel at period end
  string reason = 3;
}

message CancelSubscriptionResponse {
  Subscription subscription = 1;
}

// Resume subscription
message ResumeSubscriptionRequest {
  TenantContext context = 1;
}

message ResumeSubscriptionResponse {
  Subscription subscription = 1;
}

// Get usage
message GetUsageRequest {
  TenantContext context = 1;
  string period_id = 2;  // Optional: defaults to current period
}

message GetUsageResponse {
  Usage usage = 1;
  Usage limit = 2;  // Plan limits for comparison
}

// List invoices
message ListInvoicesRequest {
  TenantContext context = 1;
  PaginationRequest pagination = 2;
}

message ListInvoicesResponse {
  repeated Invoice invoices = 1;
  PaginationResponse pagination = 2;
}

// Get invoice
message GetInvoiceRequest {
  TenantContext context = 1;
  string invoice_id = 2;
}

message GetInvoiceResponse {
  Invoice invoice = 1;
}

// List plans
message ListPlansRequest {
  TenantContext context = 1;
}

message ListPlansResponse {
  repeated Plan plans = 1;
}

// List payment methods
message ListPaymentMethodsRequest {
  TenantContext context = 1;
}

message ListPaymentMethodsResponse {
  repeated PaymentMethod payment_methods = 1;
}

// Add payment method
message AddPaymentMethodRequest {
  TenantContext context = 1;
  string setup_intent_id = 2;  // From Stripe.js
  bool set_as_default = 3;
}

message AddPaymentMethodResponse {
  PaymentMethod payment_method = 1;
}

// Remove payment method
message RemovePaymentMethodRequest {
  TenantContext context = 1;
  string payment_method_id = 2;
}

message RemovePaymentMethodResponse {
  bool success = 1;
}

// Create checkout session (for initial subscription)
message CreateCheckoutSessionRequest {
  TenantContext context = 1;
  string plan_id = 2;
  BillingInterval interval = 3;
  string success_url = 4;
  string cancel_url = 5;
}

message CreateCheckoutSessionResponse {
  string checkout_url = 1;
  string session_id = 2;
}

// Create portal session (for managing subscription)
message CreatePortalSessionRequest {
  TenantContext context = 1;
  string return_url = 2;
}

message CreatePortalSessionResponse {
  string portal_url = 1;
}

// =============================================================================
// SERVICE
// =============================================================================

service BillingService {
  // Subscription management
  rpc GetSubscription(GetSubscriptionRequest) returns (GetSubscriptionResponse);
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  rpc UpdateSubscription(UpdateSubscriptionRequest) returns (UpdateSubscriptionResponse);
  rpc CancelSubscription(CancelSubscriptionRequest) returns (CancelSubscriptionResponse);
  rpc ResumeSubscription(ResumeSubscriptionRequest) returns (ResumeSubscriptionResponse);

  // Usage
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);

  // Invoices
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);
  rpc GetInvoice(GetInvoiceRequest) returns (GetInvoiceResponse);

  // Plans
  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse);

  // Payment methods
  rpc ListPaymentMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse);
  rpc AddPaymentMethod(AddPaymentMethodRequest) returns (AddPaymentMethodResponse);
  rpc RemovePaymentMethod(RemovePaymentMethodRequest) returns (RemovePaymentMethodResponse);

  // Stripe integration
  rpc CreateCheckoutSession(CreateCheckoutSessionRequest) returns (CreateCheckoutSessionResponse);
  rpc CreatePortalSession(CreatePortalSessionRequest) returns (CreatePortalSessionResponse);
}
