syntax = "proto3";

package llamatrade.v1;

import "llamatrade/v1/common.proto";

option java_multiple_files = true;
option java_package = "com.llamatrade.api.v1";

// =============================================================================
// ENUMS
// =============================================================================

// Order side
enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}

// Order type
enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_LIMIT = 2;
  ORDER_TYPE_STOP = 3;
  ORDER_TYPE_STOP_LIMIT = 4;
  ORDER_TYPE_TRAILING_STOP = 5;
}

// Order status
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_NEW = 1;
  ORDER_STATUS_PENDING = 2;
  ORDER_STATUS_ACCEPTED = 3;
  ORDER_STATUS_PARTIALLY_FILLED = 4;
  ORDER_STATUS_FILLED = 5;
  ORDER_STATUS_CANCELLED = 6;
  ORDER_STATUS_REJECTED = 7;
  ORDER_STATUS_EXPIRED = 8;
}

// Time in force
enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_DAY = 1;
  TIME_IN_FORCE_GTC = 2;   // Good til cancelled
  TIME_IN_FORCE_IOC = 3;   // Immediate or cancel
  TIME_IN_FORCE_FOK = 4;   // Fill or kill
  TIME_IN_FORCE_OPG = 5;   // Market on open
  TIME_IN_FORCE_CLS = 6;   // Market on close
}

// Position side
enum PositionSide {
  POSITION_SIDE_UNSPECIFIED = 0;
  POSITION_SIDE_LONG = 1;
  POSITION_SIDE_SHORT = 2;
}

// Trading mode
enum TradingMode {
  TRADING_MODE_UNSPECIFIED = 0;
  TRADING_MODE_PAPER = 1;
  TRADING_MODE_LIVE = 2;
}

// =============================================================================
// MESSAGES
// =============================================================================

// Order
message Order {
  string id = 1;
  string client_order_id = 2;
  string tenant_id = 3;
  string session_id = 4;
  string strategy_id = 5;

  // Order details
  string symbol = 6;
  OrderSide side = 7;
  OrderType type = 8;
  TimeInForce time_in_force = 9;

  // Quantities
  Decimal quantity = 10;
  Decimal filled_quantity = 11;

  // Prices
  Decimal limit_price = 12;
  Decimal stop_price = 13;
  Decimal average_fill_price = 14;
  Decimal trail_percent = 15;
  Decimal trail_price = 16;

  // Status
  OrderStatus status = 17;
  string status_message = 18;

  // Timestamps
  Timestamp created_at = 19;
  Timestamp submitted_at = 20;
  Timestamp filled_at = 21;
  Timestamp cancelled_at = 22;
  Timestamp expired_at = 23;

  // Extended hours
  bool extended_hours = 24;

  // Metadata
  map<string, string> metadata = 25;
}

// Order fill
message Fill {
  string id = 1;
  string order_id = 2;
  string symbol = 3;
  Decimal price = 4;
  Decimal quantity = 5;
  Timestamp timestamp = 6;
  string exchange = 7;
  Decimal commission = 8;
}

// Position
message Position {
  string id = 1;
  string tenant_id = 2;
  string session_id = 3;
  string symbol = 4;
  PositionSide side = 5;

  // Quantities
  Decimal quantity = 6;
  Decimal available_quantity = 7;

  // Values
  Decimal cost_basis = 8;
  Decimal average_entry_price = 9;
  Decimal current_price = 10;
  Decimal market_value = 11;

  // P&L
  Decimal unrealized_pnl = 12;
  Decimal unrealized_pnl_percent = 13;
  Decimal realized_pnl = 14;

  // Timestamps
  Timestamp opened_at = 15;
  Timestamp updated_at = 16;
}

// Trading session
message TradingSession {
  string id = 1;
  string tenant_id = 2;
  string strategy_id = 3;
  string name = 4;
  TradingMode mode = 5;
  bool is_active = 6;

  // Performance
  Decimal starting_capital = 7;
  Decimal current_equity = 8;
  Decimal total_pnl = 9;
  int32 total_trades = 10;
  int32 winning_trades = 11;

  // Timestamps
  Timestamp started_at = 12;
  Timestamp ended_at = 13;
}

// =============================================================================
// REQUESTS & RESPONSES
// =============================================================================

// Submit order
message SubmitOrderRequest {
  TenantContext context = 1;
  string session_id = 2;
  string client_order_id = 3;

  // Order details
  string symbol = 4;
  OrderSide side = 5;
  OrderType type = 6;
  TimeInForce time_in_force = 7;
  Decimal quantity = 8;
  Decimal limit_price = 9;
  Decimal stop_price = 10;
  Decimal trail_percent = 11;
  bool extended_hours = 12;

  // Metadata
  string strategy_id = 13;
  map<string, string> metadata = 14;
}

message SubmitOrderResponse {
  Order order = 1;
}

// Cancel order
message CancelOrderRequest {
  TenantContext context = 1;
  string order_id = 2;
}

message CancelOrderResponse {
  Order order = 1;
}

// Get order
message GetOrderRequest {
  TenantContext context = 1;
  string order_id = 2;
}

message GetOrderResponse {
  Order order = 1;
}

// List orders
message ListOrdersRequest {
  TenantContext context = 1;
  string session_id = 2;
  repeated OrderStatus statuses = 3;
  string symbol = 4;
  PaginationRequest pagination = 5;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  PaginationResponse pagination = 2;
}

// Get position
message GetPositionRequest {
  TenantContext context = 1;
  string session_id = 2;
  string symbol = 3;
}

message GetPositionResponse {
  Position position = 1;
}

// List positions
message ListPositionsRequest {
  TenantContext context = 1;
  string session_id = 2;
}

message ListPositionsResponse {
  repeated Position positions = 1;
}

// Close position
message ClosePositionRequest {
  TenantContext context = 1;
  string session_id = 2;
  string symbol = 3;
  Decimal quantity = 4;  // If 0, close entire position
}

message ClosePositionResponse {
  Order order = 1;
}

// Stream order updates
message StreamOrderUpdatesRequest {
  TenantContext context = 1;
  string session_id = 2;
}

// Order update event
message OrderUpdate {
  Order order = 1;
  Fill latest_fill = 2;
  string event_type = 3;  // "new", "fill", "partial_fill", "cancelled", "rejected"
  Timestamp timestamp = 4;
}

// Stream position updates
message StreamPositionUpdatesRequest {
  TenantContext context = 1;
  string session_id = 2;
}

// Position update event
message PositionUpdate {
  Position position = 1;
  string event_type = 2;  // "opened", "updated", "closed"
  Timestamp timestamp = 3;
}

// =============================================================================
// SERVICE
// =============================================================================

service TradingService {
  // Order management
  rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);

  // Position management
  rpc GetPosition(GetPositionRequest) returns (GetPositionResponse);
  rpc ListPositions(ListPositionsRequest) returns (ListPositionsResponse);
  rpc ClosePosition(ClosePositionRequest) returns (ClosePositionResponse);

  // Real-time updates
  rpc StreamOrderUpdates(StreamOrderUpdatesRequest) returns (stream OrderUpdate);
  rpc StreamPositionUpdates(StreamPositionUpdatesRequest) returns (stream PositionUpdate);
}
