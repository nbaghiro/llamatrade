syntax = "proto3";

package llamatrade.v1;

import "llamatrade/v1/common.proto";

option java_multiple_files = true;
option java_package = "com.llamatrade.api.v1";

// =============================================================================
// MESSAGES
// =============================================================================

// User information
message User {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  repeated string roles = 6;
  bool is_active = 7;
  Timestamp created_at = 8;
  Timestamp last_login = 9;
}

// Tenant (organization) information
message Tenant {
  string id = 1;
  string name = 2;
  string plan_id = 3;
  bool is_active = 4;
  Timestamp created_at = 5;
  map<string, string> settings = 6;
}

// API Key information
message APIKey {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string prefix = 4;  // First 8 chars for identification
  repeated string scopes = 5;
  Timestamp created_at = 6;
  Timestamp expires_at = 7;
  Timestamp last_used_at = 8;
  bool is_active = 9;
}

// =============================================================================
// REQUESTS & RESPONSES
// =============================================================================

// Token validation (called by other services)
message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  TenantContext context = 2;
  Timestamp expires_at = 3;
  string token_type = 4;  // "access", "refresh", "api_key"
}

// API Key validation
message ValidateAPIKeyRequest {
  string api_key = 1;
  repeated string required_scopes = 2;
}

message ValidateAPIKeyResponse {
  bool valid = 1;
  TenantContext context = 2;
  repeated string granted_scopes = 3;
  APIKey key_info = 4;
}

// Get user by ID (internal service call)
message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

// Get tenant by ID
message GetTenantRequest {
  string tenant_id = 1;
}

message GetTenantResponse {
  Tenant tenant = 1;
}

// Check permissions
message CheckPermissionRequest {
  TenantContext context = 1;
  string resource = 2;
  string action = 3;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string reason = 2;
}

// Refresh token
message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  Timestamp access_token_expires_at = 3;
  Timestamp refresh_token_expires_at = 4;
}

// =============================================================================
// SERVICE
// =============================================================================

service AuthService {
  // Token validation (high-frequency, called by all services)
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ValidateAPIKey(ValidateAPIKeyRequest) returns (ValidateAPIKeyResponse);

  // Token refresh
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // User/tenant lookup
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);

  // Authorization
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
}
