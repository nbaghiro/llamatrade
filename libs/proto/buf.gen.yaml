version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/llamatrade/api/gen/go
plugins:
  # Python protobuf messages (pinned for protobuf 6.x compatibility)
  # Output to ../grpc/ so package is llamatrade.v1 (matching proto package)
  - remote: buf.build/protocolbuffers/python:v30.2
    out: ../grpc

  # Python Connect service stubs (Connect protocol)
  - remote: buf.build/connectrpc/python:v0.8.1
    out: ../grpc

  # Keep Python gRPC stubs for backward compat
  - remote: buf.build/grpc/python:v1.71.0
    out: ../grpc

  # Generate mypy type stubs (.pyi files)
  - local: protoc-gen-mypy
    out: ../grpc
    opt:
      - readable_stubs
  - local: protoc-gen-mypy_grpc
    out: ../grpc

  # TypeScript for Connect-Web (frontend gRPC)
  # In Connect-ES v2, protoc-gen-es generates both messages AND services
  - remote: buf.build/bufbuild/es:v2.2.3
    out: ../../apps/web/src/generated/proto
    opt:
      - target=ts
