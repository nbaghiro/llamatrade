# Development overrides with hot-reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # ===================
  # Database Migrations (dev override to mount source)
  # ===================
  db-migrate:
    volumes:
      - ../../libs/db/llamatrade_db:/app/llamatrade_db:cached

  # ===================
  # Backend Services with hot-reload
  # Services run FastAPI for health checks + gRPC server started in lifespan
  # ===================
  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile.dev
    volumes:
      - ../../services/auth/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8810 --reload --reload-dir /app/src

  strategy:
    build:
      context: ../..
      dockerfile: services/strategy/Dockerfile.dev
    volumes:
      - ../../services/strategy/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8820 --reload --reload-dir /app/src

  backtest:
    build:
      context: ../..
      dockerfile: services/backtest/Dockerfile.dev
    volumes:
      - ../../services/backtest/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8830 --reload --reload-dir /app/src

  backtest-worker:
    build:
      context: ../..
      dockerfile: services/backtest/Dockerfile.dev
    volumes:
      - ../../services/backtest/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
    command: celery -A src.celery_app:celery_app worker --queues backtest --loglevel info

  market-data:
    build:
      context: ../..
      dockerfile: services/market-data/Dockerfile.dev
    volumes:
      - ../../services/market-data/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
      - ../../libs/alpaca/llamatrade_alpaca:/app/libs/alpaca/llamatrade_alpaca:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8840 --reload --reload-dir /app/src

  market-data-migrate:
    build:
      context: ../..
      dockerfile: services/market-data/Dockerfile.dev
    volumes:
      - ../../services/market-data/src:/app/src:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
    command: python -m src.store.migrate

  market-data-ingestor:
    build:
      context: ../..
      dockerfile: services/market-data/Dockerfile.dev
    volumes:
      - ../../services/market-data/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
      - ../../libs/alpaca/llamatrade_alpaca:/app/libs/alpaca/llamatrade_alpaca:cached
    command: python -m src.ingest.main

  trading:
    build:
      context: ../..
      dockerfile: services/trading/Dockerfile.dev
    volumes:
      - ../../services/trading/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8850 --reload --reload-dir /app/src

  portfolio:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile.dev
    volumes:
      - ../../services/portfolio/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8860 --reload --reload-dir /app/src

  notification:
    build:
      context: ../..
      dockerfile: services/notification/Dockerfile.dev
    volumes:
      - ../../services/notification/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8870 --reload --reload-dir /app/src

  billing:
    build:
      context: ../..
      dockerfile: services/billing/Dockerfile.dev
    volumes:
      - ../../services/billing/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8880 --reload --reload-dir /app/src

  agent:
    build:
      context: ../..
      dockerfile: services/agent/Dockerfile.dev
    volumes:
      - ../../services/agent/src:/app/src:cached
      - ../../libs/common/llamatrade_common:/app/libs/common/llamatrade_common:cached
      - ../../libs/db/llamatrade_db:/app/libs/db/llamatrade_db:cached
      - ../../libs/proto/llamatrade_proto:/app/libs/proto/llamatrade_proto:cached
      - ../../libs/dsl/llamatrade_dsl:/app/libs/dsl/llamatrade_dsl:cached
    command: uvicorn src.main:app --host 0.0.0.0 --port 8890 --reload --reload-dir /app/src

  # ===================
  # Frontend with Vite HMR
  # ===================
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile.dev
    volumes:
      # Mount the whole app so Vite sees index.html, vite.config.ts and tsconfig*
      # (they live at the app root, not in src/). The anonymous node_modules
      # volume preserves the image's installed deps instead of the host's.
      - ../../apps/web:/app:cached
      - /app/node_modules
    # !override replaces the base file's "8800:80" mapping instead of Compose's
    # default list-concatenation, which would publish host 8800 twice (->80 and
    # ->8800) and fail with "port is already allocated". Dev Vite serves on 8800.
    ports: !override
      - "8800:8800"
    environment:
      # Agent's host port is remapped to 8990 (see docker-compose.yml). The
      # browser talks to the agent directly, so point it at the remapped port.
      VITE_AGENT_URL: http://localhost:8990
    command: npm run dev -- --host 0.0.0.0 --port 8800
