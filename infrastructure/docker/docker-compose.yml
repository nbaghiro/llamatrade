name: llamatrade

services:
  # ===================
  # Database Migrations
  # ===================
  db-migrate:
    build:
      context: ../..
      dockerfile: libs/db/Dockerfile
    container_name: llamatrade-db-migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ===================
  # Infrastructure
  # ===================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: llamatrade-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llamatrade
    volumes:
      - llamatrade_postgres_data:/var/lib/postgresql/data
    ports:
      # Host port remapped 5432->5442 to avoid clashing with a local (non-Docker)
      # Postgres on the default 5432. Container-internal port stays 5432.
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llamatrade-redis
    command: redis-server --appendonly yes
    volumes:
      - llamatrade_redis_data:/data
    ports:
      # Host port remapped 6379->6389 to avoid clashing with a local (non-Docker)
      # Redis on the default 6379. Container-internal port stays 6379.
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # Backend Services
  # ===================
  auth:
    build:
      context: ../../services/auth
      dockerfile: Dockerfile
    container_name: llamatrade-auth
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-me}
      GRPC_PORT: "8810"
      # Per-service pool sizing. Each service holds its own pool, so the sum of
      # (DB_POOL_SIZE + DB_MAX_OVERFLOW) across services must stay under Postgres
      # max_connections (default 100). Current budget totals ~74. Watch the
      # llamatrade_db_connections_* metrics; if they climb, move to PgBouncer.
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8810:8810"

  strategy:
    build:
      context: ../../services/strategy
      dockerfile: Dockerfile
    container_name: llamatrade-strategy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8820"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "8820:8820"

  backtest:
    build:
      context: ../../services/backtest
      dockerfile: Dockerfile
    container_name: llamatrade-backtest
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8830"
      MARKET_DATA_GRPC_TARGET: market-data:8840
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8830:8830"

  backtest-worker:
    build:
      context: ../../services/backtest
      dockerfile: Dockerfile
    container_name: llamatrade-backtest-worker
    command: celery -A src.celery_app:celery_app worker --queues backtest --loglevel info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      MARKET_DATA_GRPC_TARGET: market-data:8840
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Embedded beat scheduler + maintenance-queue worker: runs the periodic
  # reaper (1A) that recovers orphaned RUNNING/PENDING runs. Single instance.
  backtest-beat:
    build:
      context: ../../services/backtest
      dockerfile: Dockerfile
    container_name: llamatrade-backtest-beat
    command: celery -A src.celery_app:celery_app worker -B --queues backtest_maintenance --concurrency 1 --loglevel info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      MARKET_DATA_GRPC_TARGET: market-data:8840
      DB_POOL_SIZE: "2"
      DB_MAX_OVERFLOW: "2"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Dedicated Timescale instance for the market-data store (separate from the
  # shared pgvector Postgres — different workload, retention, failure domain).
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: llamatrade-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_data
    volumes:
      - llamatrade_timescale_data:/var/lib/postgresql/data
    ports:
      # Remapped to avoid clashing with the shared Postgres (5442) and any local PG.
      - "5443:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create hypertables, continuous aggregates, retention/compression.
  market-data-migrate:
    build:
      context: ../../services/market-data
      dockerfile: Dockerfile
    container_name: llamatrade-market-data-migrate
    command: python -m src.store.migrate
    environment:
      MARKET_DATA_DB_URL: postgresql+asyncpg://postgres:postgres@timescaledb:5432/market_data
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  # Serving (api) role — reads the store, falls back to Alpaca, fans out live bars.
  market-data:
    build:
      context: ../../services/market-data
      dockerfile: Dockerfile
    container_name: llamatrade-market-data
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8840"
      MARKET_DATA_DB_URL: postgresql+asyncpg://postgres:postgres@timescaledb:5432/market_data
      MARKET_DATA_DB_POOL_SIZE: "5"
      MARKET_DATA_DB_MAX_OVERFLOW: "5"
    depends_on:
      redis:
        condition: service_healthy
      market-data-migrate:
        condition: service_completed_successfully
    ports:
      - "8840:8840"

  # Ingest (writer) role — single Alpaca consumer; backfills + streams into the
  # store and republishes live bars on the internal bus. Same image, different
  # command; runs as a singleton (do not scale this replica).
  market-data-ingestor:
    build:
      context: ../../services/market-data
      dockerfile: Dockerfile
    container_name: llamatrade-market-data-ingestor
    command: python -m src.ingest.main
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      REDIS_URL: redis://redis:6379
      MARKET_DATA_DB_URL: postgresql+asyncpg://postgres:postgres@timescaledb:5432/market_data
      MARKET_DATA_DB_POOL_SIZE: "5"
      MARKET_DATA_DB_MAX_OVERFLOW: "5"
      # IEX feed + a small universe by default; widen via .env for QA.
      MARKET_DATA_FEED: ${MARKET_DATA_FEED:-iex}
      MARKET_DATA_UNIVERSE: ${MARKET_DATA_UNIVERSE:-AAPL,MSFT,SPY}
      MARKET_DATA_MINUTE_LOOKBACK_DAYS: ${MARKET_DATA_MINUTE_LOOKBACK_DAYS:-5}
      MARKET_DATA_DAILY_LOOKBACK_DAYS: ${MARKET_DATA_DAILY_LOOKBACK_DAYS:-365}
    depends_on:
      market-data-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  trading:
    build:
      context: ../../services/trading
      dockerfile: Dockerfile
    container_name: llamatrade-trading
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8850"
      # Busiest DB user (orders/positions/risk) — gets the largest slice.
      DB_POOL_SIZE: "8"
      DB_MAX_OVERFLOW: "8"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8850:8850"

  portfolio:
    build:
      context: ../../services/portfolio
      dockerfile: Dockerfile
    container_name: llamatrade-portfolio
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8860"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "8860:8860"

  notification:
    build:
      context: ../../services/notification
      dockerfile: Dockerfile
    container_name: llamatrade-notification
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GRPC_PORT: "8870"
      DB_POOL_SIZE: "2"
      DB_MAX_OVERFLOW: "2"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8870:8870"

  billing:
    build:
      context: ../../services/billing
      dockerfile: Dockerfile
    container_name: llamatrade-billing
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GRPC_PORT: "8880"
      # HTTP port for Stripe webhooks only (different from gRPC port)
      HTTP_PORT: "8881"
      DB_POOL_SIZE: "3"
      DB_MAX_OVERFLOW: "3"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "8880:8880"
      - "8881:8881"  # Stripe webhooks require HTTP

  agent:
    build:
      # Repo-root context: the agent Dockerfile copies libs/* (common, db, proto, dsl)
      context: ../..
      dockerfile: services/agent/Dockerfile
    container_name: llamatrade-agent
    # LLM credentials (OPENAI_API_KEY / ANTHROPIC_API_KEY) come from the repo-root
    # .env, which Compose does not auto-interpolate when run from this directory.
    # env_file injects them directly; the environment block below still wins for
    # DATABASE_URL/REDIS_URL/targets (environment takes precedence over env_file).
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8890"
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-claude-sonnet-4-20250514}
      DB_POOL_SIZE: "4"
      DB_MAX_OVERFLOW: "4"
      # Downstream service targets (Connect/HTTP over the Docker network)
      STRATEGY_SERVICE_URL: http://strategy:8820
      STRATEGY_GRPC_TARGET: http://strategy:8820
      MARKET_DATA_GRPC_TARGET: http://market-data:8840
      BACKTEST_GRPC_TARGET: http://backtest:8830
      PORTFOLIO_GRPC_TARGET: http://portfolio:8860
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      # Host port remapped 8890->8990 to avoid a local (non-Docker) service on
      # 8890 (e.g. PocketSuite). Container-internal port stays 8890. The browser
      # reaches the agent via VITE_AGENT_URL (set to localhost:8990 in dev).
      - "8990:8890"

  # ===================
  # Frontend
  # ===================
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: llamatrade-web
    ports:
      - "8800:80"
    depends_on:
      - auth

volumes:
  llamatrade_postgres_data:
  llamatrade_redis_data:
  llamatrade_timescale_data:

networks:
  default:
    name: llamatrade-network
