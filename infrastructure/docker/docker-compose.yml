name: llamatrade

services:
  # ===================
  # Database Migrations
  # ===================
  db-migrate:
    build:
      context: ../../libs/db
      dockerfile: Dockerfile
    container_name: llamatrade-db-migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ===================
  # Infrastructure
  # ===================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: llamatrade-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llamatrade
    volumes:
      - llamatrade_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llamatrade-redis
    command: redis-server --appendonly yes
    volumes:
      - llamatrade_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # Backend Services
  # ===================
  auth:
    build:
      context: ../../services/auth
      dockerfile: Dockerfile
    container_name: llamatrade-auth
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-me}
      GRPC_PORT: "8810"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8810:8810"

  strategy:
    build:
      context: ../../services/strategy
      dockerfile: Dockerfile
    container_name: llamatrade-strategy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8820"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "8820:8820"

  backtest:
    build:
      context: ../../services/backtest
      dockerfile: Dockerfile
    container_name: llamatrade-backtest
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8830"
      MARKET_DATA_GRPC_TARGET: market-data:8840
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8830:8830"

  market-data:
    build:
      context: ../../services/market-data
      dockerfile: Dockerfile
    container_name: llamatrade-market-data
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8840"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8840:8840"

  trading:
    build:
      context: ../../services/trading
      dockerfile: Dockerfile
    container_name: llamatrade-trading
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8850"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8850:8850"

  portfolio:
    build:
      context: ../../services/portfolio
      dockerfile: Dockerfile
    container_name: llamatrade-portfolio
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "8860"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "8860:8860"

  notification:
    build:
      context: ../../services/notification
      dockerfile: Dockerfile
    container_name: llamatrade-notification
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      REDIS_URL: redis://redis:6379
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GRPC_PORT: "8870"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8870:8870"

  billing:
    build:
      context: ../../services/billing
      dockerfile: Dockerfile
    container_name: llamatrade-billing
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llamatrade
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GRPC_PORT: "8880"
      # HTTP port for Stripe webhooks only (different from gRPC port)
      HTTP_PORT: "8881"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "8880:8880"
      - "8881:8881"  # Stripe webhooks require HTTP

  # ===================
  # Frontend
  # ===================
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: llamatrade-web
    ports:
      - "8800:80"
    depends_on:
      - auth

volumes:
  llamatrade_postgres_data:
  llamatrade_redis_data:

networks:
  default:
    name: llamatrade-network
