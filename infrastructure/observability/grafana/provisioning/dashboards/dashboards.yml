# Grafana dashboard provider — loads JSON dashboards from disk on startup.
apiVersion: 1

providers:
  - name: LlamaTrade
    orgId: 1
    folder: LlamaTrade
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Mounted via docker-compose (see grafana volumes).
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
