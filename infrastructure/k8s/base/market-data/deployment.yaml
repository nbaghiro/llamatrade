apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data
  namespace: llamatrade
  labels:
    app: market-data
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data
  template:
    metadata:
      labels:
        app: market-data
        tier: backend
    spec:
      containers:
        - name: market-data
          image: gcr.io/llamatrade/market-data:latest
          ports:
            - containerPort: 8840
          env:
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alpaca-credentials
                  key: api_key
            - name: ALPACA_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: alpaca-credentials
                  key: api_secret
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: llamatrade-config
                  key: LOG_LEVEL
          envFrom:
            - configMapRef:
                name: llamatrade-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8840
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8840
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: market-data
  namespace: llamatrade
spec:
  selector:
    app: market-data
  ports:
    - port: 8840
      targetPort: 8840
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: market-data-hpa
  namespace: llamatrade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: market-data
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
