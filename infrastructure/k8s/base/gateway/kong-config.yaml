apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: llamatrade
data:
  kong.yaml: |
    _format_version: "3.0"
    _transform: true

    # gRPC upstreams for backend services
    upstreams:
      - name: billing-http-upstream
        targets:
          - target: billing:8881
            weight: 100
        healthchecks:
          active:
            http_path: /health
            healthy:
              interval: 5
              successes: 2
            unhealthy:
              interval: 5
              http_failures: 3

      - name: auth-grpc-upstream
        targets:
          - target: auth:8810
            weight: 100

      - name: strategy-grpc-upstream
        targets:
          - target: strategy:8820
            weight: 100

      - name: backtest-grpc-upstream
        targets:
          - target: backtest:8830
            weight: 100

      - name: market-data-grpc-upstream
        targets:
          - target: market-data:8840
            weight: 100

      - name: trading-grpc-upstream
        targets:
          - target: trading:8850
            weight: 100

      - name: portfolio-grpc-upstream
        targets:
          - target: portfolio:8860
            weight: 100

      - name: notification-grpc-upstream
        targets:
          - target: notification:8870
            weight: 100

      - name: billing-grpc-upstream
        targets:
          - target: billing:8880
            weight: 100

    services:
      # Stripe Webhook (HTTP - required by Stripe)
      - name: stripe-webhook-service
        host: billing-http-upstream
        port: 8881
        protocol: http
        routes:
          - name: stripe-webhook-route
            paths:
              - /api/webhooks/stripe
            methods:
              - POST
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local

      # Auth gRPC Service
      - name: grpc-auth-service
        host: auth-grpc-upstream
        port: 8810
        protocol: grpc
        routes:
          - name: grpc-auth-routes
            paths:
              - /grpc/llamatrade.v1.AuthService
            protocols:
              - http
              - https
        plugins:
          - name: grpc-web
          - name: rate-limiting
            config:
              minute: 100
              policy: local

      # Strategy gRPC Service
      - name: grpc-strategy-service
        host: strategy-grpc-upstream
        port: 8820
        protocol: grpc
        routes:
          - name: grpc-strategy-routes
            paths:
              - /grpc/llamatrade.v1.StrategyService
            protocols:
              - http
              - https
        plugins:
          - name: grpc-web
          - name: rate-limiting
            config:
              minute: 200
              policy: local

      # Backtest gRPC Service
      - name: grpc-backtest-service
        host: backtest-grpc-upstream
        port: 8830
        protocol: grpc
        routes:
          - name: grpc-backtest-routes
            paths:
              - /grpc/llamatrade.v1.BacktestService
            protocols:
              - http
              - https
        plugins:
          - name: grpc-web
          - name: rate-limiting
            config:
              minute: 50
              policy: local

      # Market Data gRPC Service
      - name: grpc-market-data-service
        host: market-data-grpc-upstream
        port: 8840
        protocol: grpc
        routes:
          - name: grpc-market-data-routes
            paths:
              - /grpc/llamatrade.v1.MarketDataService
            protocols:
              - http
              - https
        plugins:
          - name: grpc-web
          - name: rate-limiting
            config:
              minute: 1000
              policy: local

      # Trading gRPC Service
      - name: grpc-trading-service
        host: trading-grpc-upstream
        port: 8850
        protocol: grpc
        routes:
          - name: grpc-trading-routes
            paths:
              - /grpc/llamatrade.v1.TradingService
            protocols:
              - http
              - https
        plugins:
          - name: grpc-web
          - name: rate-limiting
            config:
              minute: 100
              policy: local

      # Portfolio gRPC Service
      - name: grpc-portfolio-service
        host: portfolio-grpc-upstream
        port: 8860
        protocol: grpc
        routes:
          - name: grpc-portfolio-routes
            paths:
              - /grpc/llamatrade.v1.PortfolioService
            protocols:
              - http
              - https
        plugins:
          - name: grpc-web
          - name: rate-limiting
            config:
              minute: 300
              policy: local

      # Notification gRPC Service
      - name: grpc-notification-service
        host: notification-grpc-upstream
        port: 8870
        protocol: grpc
        routes:
          - name: grpc-notification-routes
            paths:
              - /grpc/llamatrade.v1.NotificationService
            protocols:
              - http
              - https
        plugins:
          - name: grpc-web
          - name: rate-limiting
            config:
              minute: 100
              policy: local

      # Billing gRPC Service
      - name: grpc-billing-service
        host: billing-grpc-upstream
        port: 8880
        protocol: grpc
        routes:
          - name: grpc-billing-routes
            paths:
              - /grpc/llamatrade.v1.BillingService
            protocols:
              - http
              - https
        plugins:
          - name: grpc-web
          - name: rate-limiting
            config:
              minute: 50
              policy: local

    # Global plugins
    plugins:
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true

      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
            - Accept
            - Origin
            - grpc-timeout
            - x-grpc-web
            - x-user-agent
          exposed_headers:
            - grpc-status
            - grpc-message
          credentials: true
          max_age: 3600

      - name: prometheus
        config:
          per_consumer: false

    # Consumer for internal services
    consumers:
      - username: internal-services
        custom_id: internal
