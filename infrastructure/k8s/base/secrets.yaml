# NOTE: This is a template. Actual secrets should be managed via:
# - GCP Secret Manager with External Secrets Operator
# - Sealed Secrets
# - kubectl create secret (not checked into git)
#
# kubectl create secret generic db-credentials \
#   --from-literal=url='postgresql+asyncpg://user:pass@host:5432/llamatrade' \
#   -n llamatrade
#
# kubectl create secret generic jwt-secret \
#   --from-literal=secret='your-256-bit-secret' \
#   -n llamatrade
#
# kubectl create secret generic encryption-key \
#   --from-literal=key='your-encryption-key' \
#   -n llamatrade
#
# kubectl create secret generic alpaca-credentials \
#   --from-literal=api_key='your-api-key' \
#   --from-literal=api_secret='your-api-secret' \
#   -n llamatrade
#
# kubectl create secret generic stripe-credentials \
#   --from-literal=secret_key='sk_live_...' \
#   --from-literal=webhook_secret='whsec_...' \
#   -n llamatrade
#
# kubectl create secret generic smtp-credentials \
#   --from-literal=host='smtp.example.com' \
#   --from-literal=user='user@example.com' \
#   --from-literal=password='password' \
#   -n llamatrade
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: llamatrade
type: Opaque
stringData:
  url: "postgresql+asyncpg://postgres:CHANGE_ME@postgres:5432/llamatrade"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: llamatrade
type: Opaque
stringData:
  secret: "CHANGE_ME_IN_PRODUCTION_256_BIT_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: encryption-key
  namespace: llamatrade
type: Opaque
stringData:
  key: "CHANGE_ME_IN_PRODUCTION_ENCRYPTION_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: alpaca-credentials
  namespace: llamatrade
type: Opaque
stringData:
  api_key: "CHANGE_ME"
  api_secret: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: stripe-credentials
  namespace: llamatrade
type: Opaque
stringData:
  secret_key: "sk_test_CHANGE_ME"
  webhook_secret: "whsec_CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: smtp-credentials
  namespace: llamatrade
type: Opaque
stringData:
  host: "smtp.example.com"
  user: "CHANGE_ME"
  password: "CHANGE_ME"
