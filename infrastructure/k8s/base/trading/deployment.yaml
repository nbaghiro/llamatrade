apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading
  namespace: llamatrade
  labels:
    app: trading
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading
  template:
    metadata:
      labels:
        app: trading
        tier: backend
    spec:
      containers:
        - name: trading
          image: gcr.io/llamatrade/trading:latest
          ports:
            - containerPort: 8005
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alpaca-credentials
                  key: api_key
            - name: ALPACA_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: alpaca-credentials
                  key: api_secret
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: llamatrade-config
                  key: LOG_LEVEL
          envFrom:
            - configMapRef:
                name: llamatrade-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trading
  namespace: llamatrade
spec:
  selector:
    app: trading
  ports:
    - port: 8005
      targetPort: 8005
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trading-hpa
  namespace: llamatrade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trading
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
