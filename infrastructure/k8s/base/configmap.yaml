apiVersion: v1
kind: ConfigMap
metadata:
  name: llamatrade-config
  namespace: llamatrade
data:
  # Service gRPC targets (internal K8s DNS)
  AUTH_GRPC_TARGET: "auth:8810"
  STRATEGY_GRPC_TARGET: "strategy:8820"
  BACKTEST_GRPC_TARGET: "backtest:8830"
  MARKET_DATA_GRPC_TARGET: "market-data:8840"
  TRADING_GRPC_TARGET: "trading:8850"
  PORTFOLIO_GRPC_TARGET: "portfolio:8860"
  NOTIFICATION_GRPC_TARGET: "notification:8870"
  BILLING_GRPC_TARGET: "billing:8880"
  # Billing also exposes HTTP on 8881 for Stripe webhooks
  BILLING_HTTP_URL: "http://billing:8881"
  # Common settings
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: llamatrade
data:
  REDIS_URL: "redis://redis:6379"
