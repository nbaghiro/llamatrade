apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: llamatrade
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: llamatrade
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-services
  namespace: llamatrade
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    # Allow from other backend services and from ingress (for Connect protocol)
    - from:
        - podSelector:
            matchLabels:
              tier: backend
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        # gRPC ports for backend services
        - protocol: TCP
          port: 8810  # auth
        - protocol: TCP
          port: 8820  # strategy
        - protocol: TCP
          port: 8830  # backtest
        - protocol: TCP
          port: 8840  # market-data
        - protocol: TCP
          port: 8850  # trading
        - protocol: TCP
          port: 8860  # portfolio
        - protocol: TCP
          port: 8870  # notification
        - protocol: TCP
          port: 8880  # billing gRPC
        - protocol: TCP
          port: 8881  # billing HTTP (Stripe webhooks)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-access
  namespace: llamatrade
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - protocol: TCP
          port: 6379
