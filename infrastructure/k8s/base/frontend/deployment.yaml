apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: llamatrade
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/llamatrade/web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: llamatrade
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: llamatrade
  annotations:
    kubernetes.io/ingress.global-static-ip-name: llamatrade-ip
    networking.gke.io/managed-certificates: llamatrade-cert
spec:
  rules:
    - host: llamatrade.com
      http:
        paths:
          # Frontend SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # Connect protocol routes directly to services
          - path: /llamatrade.v1.AuthService
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8810
          - path: /llamatrade.v1.StrategyService
            pathType: Prefix
            backend:
              service:
                name: strategy
                port:
                  number: 8820
          - path: /llamatrade.v1.BacktestService
            pathType: Prefix
            backend:
              service:
                name: backtest
                port:
                  number: 8830
          - path: /llamatrade.v1.MarketDataService
            pathType: Prefix
            backend:
              service:
                name: market-data
                port:
                  number: 8840
          - path: /llamatrade.v1.TradingService
            pathType: Prefix
            backend:
              service:
                name: trading
                port:
                  number: 8850
          - path: /llamatrade.v1.PortfolioService
            pathType: Prefix
            backend:
              service:
                name: portfolio
                port:
                  number: 8860
          - path: /llamatrade.v1.NotificationService
            pathType: Prefix
            backend:
              service:
                name: notification
                port:
                  number: 8870
          - path: /llamatrade.v1.BillingService
            pathType: Prefix
            backend:
              service:
                name: billing
                port:
                  number: 8880
