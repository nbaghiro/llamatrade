apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest
  namespace: llamatrade
  labels:
    app: backtest
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backtest
  template:
    metadata:
      labels:
        app: backtest
        tier: backend
    spec:
      containers:
        - name: backtest
          image: gcr.io/llamatrade/backtest:latest
          ports:
            - containerPort: 8830
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: llamatrade-config
                  key: LOG_LEVEL
          envFrom:
            - configMapRef:
                name: llamatrade-config
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8830
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8830
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backtest
  namespace: llamatrade
spec:
  selector:
    app: backtest
  ports:
    - port: 8830
      targetPort: 8830
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backtest-hpa
  namespace: llamatrade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backtest
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
