apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: llamatrade
  labels:
    app: notification
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
        tier: backend
    spec:
      containers:
        - name: notification
          image: gcr.io/llamatrade/notification:latest
          ports:
            - containerPort: 8870
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_URL
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: host
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: user
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: password
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: llamatrade-config
                  key: LOG_LEVEL
          envFrom:
            - configMapRef:
                name: llamatrade-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8870
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8870
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: llamatrade
spec:
  selector:
    app: notification
  ports:
    - port: 8870
      targetPort: 8870
  type: ClusterIP
