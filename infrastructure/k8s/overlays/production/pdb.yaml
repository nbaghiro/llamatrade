apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-pdb
  namespace: llamatrade
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: trading-pdb
  namespace: llamatrade
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: trading
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: market-data-pdb
  namespace: llamatrade
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: market-data
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: llamatrade
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: frontend
